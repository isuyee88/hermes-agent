model:
  default: openrouter/free

default_reset_policy:
  mode: both
  at_hour: 4
  idle_minutes: 1440
  notify: true

display:
  tool_progress: new
  tool_progress_command: true
  tool_progress_overrides:
    telegram: new
    qq: new

streaming:
  enabled: false

security:
  redact_secrets: true

terminal:
  backend: local
  cwd: "/root"
  env_passthrough:
    - ANTHROPIC_API_KEY
    - OPENAI_API_KEY
    - OPENAI_BASE_URL
    - OPENROUTER_API_KEY
    - OPENROUTER_BASE_URL
    - HERMES_PROVIDER
    - HERMES_ENABLE_PROJECT_PLUGINS
    - SUPERMEMORY_API_KEY
    - SUPERMEMORY_CONTAINER_TAG
    - FIRECRAWL_API_KEY
    - FIRECRAWL_API_URL
    - PARALLEL_API_KEY
    - TAVILY_API_KEY
    - EXA_API_KEY
    - BROWSERBASE_API_KEY
    - BROWSERBASE_PROJECT_ID
    - BROWSER_USE_API_KEY
    - FIRECRAWL_BROWSER_SESSION_TTL
    - CAMOFOX_URL
    - HASS_URL
    - HASS_TOKEN
    - API_SERVER_ENABLED
    - API_SERVER_KEY
    - API_SERVER_PORT
    - API_SERVER_HOST
    - FEISHU_APP_ID
    - FEISHU_APP_SECRET
    - FEISHU_DOMAIN
    - FEISHU_CONNECTION_MODE
    - FEISHU_ENCRYPT_KEY
    - FEISHU_VERIFICATION_TOKEN
    - FEISHU_BITABLE_APP_TOKEN
    - FEISHU_BITABLE_TABLE_ID
    - FEISHU_MODEL_REGISTRY_MIRROR_ENABLED
    - FEISHU_GROUP_POLICY
    - FEISHU_ALLOWED_USERS
    - FEISHU_BOT_OPEN_ID
    - FEISHU_BOT_USER_ID
    - FEISHU_BOT_NAME
    - FEISHU_HOME_CHANNEL
    - HERMES_FEISHU_RESOLVE_SENDER_NAMES
    - HERMES_FEISHU_MENU_OPEN_BY_OPEN_ID
    - HERMES_FEISHU_TOOL_CAPABILITIES
    - HERMES_FEISHU_DEFAULT_WORKSPACE
  modal_image: "nikolaik/python-nodejs:python3.11-nodejs20"
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true

memory:
  provider: supermemory

telegram:
  require_mention: false
  reactions: false
  free_response_chats:
    - "private"

platforms:
  telegram:
    enabled: true
    reply_to_mode: first
  qq:
    enabled: false
    extra:
      connection_mode: webhook
      webhook_path: /qq/webhook
  feishu:
    enabled: false
    extra:
      connection_mode: webhook
      webhook_path: /feishu/webhook
